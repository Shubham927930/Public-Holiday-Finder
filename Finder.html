<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Holiday Finder</title>
    <link rel="stylesheet" href="./Finder.css">
</head>
<body>
    
    <div class="holiday-container">
        <h2>Public Holiday Finder</h2>

        <div class="controls">
            <select id="country">
                <option value="US">United States</option>
                <option value="IN">India</option>
                <option value="GB">United Kingdom</option>
                <option value="AU">Australia</option>
                <option value="CA">Canada</option>
            </select>

            <input type="number" id="year" placeholder="Year(e.g.2026)">
        </div>

        <button onclick="getHolidays()">Find Holidays</button>

        <div id="holidayList" class="holiday-List"></div>
    </div>

    <script src="./Finder.js"></script>
</body>
</html>
